services:
  # ── Docker Socket Proxy ──────────────────────────────────────
  # Traefik no accede directamente al socket de Docker.
  # Este proxy expone solo las APIs de lectura necesarias.
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: docker-socket-proxy
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      SERVICES: 0
      TASKS: 0
      NETWORKS: 1
      NODES: 0
      POST: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - socket-proxy

  traefik:
    image: traefik:v3.5
    container_name: traefik
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.le.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.le.acme.tlschallenge=true
      - --log.level=INFO
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - traefik_letsencrypt:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - web

  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── MySQL Backup (daily at 03:00 UTC) ───────────────────────
  mysql-backup:
    image: databack/mysql-backup:latest
    container_name: mysql-backup
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_SERVER: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASS: ${DB_ROOT_PASSWORD}
      DB_NAMES: ${DB_NAME}
      DB_DUMP_CRON: "0 3 * * *"
      DB_DUMP_TARGET: /backup
      DB_DUMP_SAFECHARS: "true"
      COMPRESSION: gzip
      DB_DUMP_KEEP_PERMISSIONS: "true"
      # Retener últimos 14 días de backups
      DB_DUMP_KEEP_DAYS: 14
    volumes:
      - mysql_backups:/backup
    networks:
      - internal

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES: 15m
      JWT_REFRESH_EXPIRES: 7d
      CORS_ORIGIN: https://planificador.app,https://www.planificador.app
      APP_DOMAIN: planificador.app
      APP_PROTOCOL: https
      FRONTEND_URL: https://planificador.app
      SEED_ON_BOOT: ${SEED_ON_BOOT:-false}
      MIGRATION_MODE: ${MIGRATION_MODE:-normal}
      ALLOW_FRESH_IN_PRODUCTION: ${ALLOW_FRESH_IN_PRODUCTION:-false}
      ALLOW_SEED_IN_PRODUCTION: ${ALLOW_SEED_IN_PRODUCTION:-false}
      SEED_SUPERADMIN_EMAIL: ${SEED_SUPERADMIN_EMAIL:-}
      SEED_SUPERADMIN_NAME: ${SEED_SUPERADMIN_NAME:-}
      SEED_SUPERADMIN_PASSWORD: ${SEED_SUPERADMIN_PASSWORD:-}
      SEED_DEMO_TENANT: ${SEED_DEMO_TENANT:-false}
      SEED_DEMO_OWNER_EMAIL: ${SEED_DEMO_OWNER_EMAIL:-}
      SEED_DEMO_OWNER_NAME: ${SEED_DEMO_OWNER_NAME:-}
      SEED_DEMO_OWNER_PASSWORD: ${SEED_DEMO_OWNER_PASSWORD:-}
      SEED_DEMO_COMPANY_NAME: ${SEED_DEMO_COMPANY_NAME:-}
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - web
      - internal
    labels:
      - traefik.enable=true
      - traefik.docker.network=web
      - traefik.http.routers.backend.rule=Host(`api.planificador.app`)
      - traefik.http.routers.backend.entrypoints=websecure
      - traefik.http.routers.backend.tls.certresolver=le
      - traefik.http.services.backend.loadbalancer.server.port=4000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.planificador.app
    container_name: frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://api.planificador.app
    networks:
      - web
    labels:
      - traefik.enable=true
      - traefik.docker.network=web
      # Router principal (apex)
      - traefik.http.routers.frontend.rule=Host(`planificador.app`)
      - traefik.http.routers.frontend.entrypoints=websecure
      - traefik.http.routers.frontend.tls.certresolver=le
      - traefik.http.services.frontend.loadbalancer.server.port=3000
      # Router para www con redirect a apex
      - traefik.http.routers.frontend-www.rule=Host(`www.planificador.app`)
      - traefik.http.routers.frontend-www.entrypoints=websecure
      - traefik.http.routers.frontend-www.tls.certresolver=le
      - traefik.http.routers.frontend-www.middlewares=wwwredirect
      - traefik.http.middlewares.wwwredirect.redirectregex.regex=^https?://www\.planificador\.app/(.*)
      - traefik.http.middlewares.wwwredirect.redirectregex.replacement=https://planificador.app/$${1}
      - traefik.http.middlewares.wwwredirect.redirectregex.permanent=true

volumes:
  mysql_data:
  mysql_backups:
  backend_uploads:
  traefik_letsencrypt:

networks:
  web:
    name: web
  internal:
    name: internal
  socket-proxy:
    name: socket-proxy
    internal: true
